name: Build Windows Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build NSIS installer
        run: npm run build:win -- --publish=never
        env:
          GH_TOKEN: ""
      
      - name: Build APPX installer
        run: npm run build:win:appx -- --publish=never
        env:
          GH_TOKEN: ""
      
      - name: List build artifacts
        shell: bash
        run: |
          echo "Checking dist-electron directory:"
          find dist-electron -maxdepth 1 -type f \( -name "*.exe" -o -name "*.appx" \) -print0 | xargs -0 ls -lh
      
      - name: Upload artifacts to release
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          
          # Create release if it doesn't exist
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes
          fi
          
          # Upload all exe and appx files
          find dist-electron -maxdepth 1 -type f \( -name "*.exe" -o -name "*.appx" \) -print0 | \
            xargs -0 gh release upload "$TAG" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
