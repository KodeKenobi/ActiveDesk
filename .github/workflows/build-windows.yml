name: Build Windows Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build NSIS installer
        run: npm run build:win -- --publish=never
        env:
          GH_TOKEN: ""
      
      - name: Build APPX installer
        run: npm run build:win:appx -- --publish=never
        env:
          GH_TOKEN: ""
      
      - name: List build artifacts
        shell: bash
        run: |
          echo "Checking dist-electron directory:"
          ls -la dist-electron/ || echo "dist-electron not found"
          find dist-electron -type f \( -name "*.exe" -o -name "*.appx" -o -name "*.dmg" \) 2>/dev/null || echo "No matching files found"
      
      - name: Upload artifacts to release
        shell: bash
        run: |
          FILES=()
          if [ -d "dist-electron" ]; then
            FILES+=($(find dist-electron -maxdepth 1 -type f \( -name "*.exe" -o -name "*.appx" \) 2>/dev/null))
          fi
          
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No artifacts found to upload"
            exit 1
          fi
          
          echo "Found ${#FILES[@]} artifacts to upload"
          for file in "${FILES[@]}"; do
            echo "  - $file"
          done
          
          if gh release view v1.0.2 >/dev/null 2>&1; then
            gh release upload v1.0.2 "${FILES[@]}"
          else
            gh release create v1.0.2 --generate-notes "${FILES[@]}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
