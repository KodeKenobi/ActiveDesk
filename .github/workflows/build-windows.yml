name: Build Windows Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build NSIS installer
        run: npm run build:win -- --publish=never
        env:
          GH_TOKEN: ""
      
      - name: Build APPX installer
        run: npm run build:win:appx -- --publish=never
        env:
          GH_TOKEN: ""
      
      - name: Upload artifacts to release
        shell: bash
        run: |
          FILES=$(find dist-electron -maxdepth 1 \( -name "*.exe" -o -name "*.appx" \) -type f)
          if gh release view v1.0.2 >/dev/null 2>&1; then
            gh release upload v1.0.2 $FILES
          else
            gh release create v1.0.2 --generate-notes $FILES
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
